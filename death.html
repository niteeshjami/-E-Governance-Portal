<!DOCTYPE html>
<html>
<head>
<title>Death Registration</title>
<style>
body{margin:0;padding-top:90px;font-family:Arial,Helvetica,sans-serif;background-image:url("https://image2url.com/r2/default/images/1774979452253-f86cced7-9c2f-4ae4-bfe0-97e17c041586.jpg");background-size:cover;background-position:center;background-attachment:fixed;}
header{background:#0b3d91;color:white;display:flex;align-items:center;justify-content:space-between;padding:15px 40px;position:fixed;top:0;left:0;right:0;z-index:1000;}
.logo{display:flex;align-items:center;gap:10px;}
nav a{color:white;text-decoration:none;margin:0 12px;font-weight:bold;}
form{background:white;padding:30px;width:420px;margin:auto;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
label{font-weight:bold;display:block;margin-top:10px;}
input,select{width:100%;padding:10px;margin:6px 0;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;}
button{background:#0b3d91;color:white;border:none;padding:10px 20px;cursor:pointer;border-radius:5px;margin-top:10px;width:100%;}
button.back{background:#555;margin-top:8px;}
#msg{text-align:center;font-weight:bold;margin-top:10px;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" height="40">
    <h2>Smart E-Governance Portal</h2>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#servicesPanel">Explore Services</a>
    <a href="track.html">Track</a>
    <a href="admin-login.html">Admin</a>
  </nav>
</header>

<form onsubmit="handleSubmit(event)">
  <h2 style="color:#0b3d91;text-align:center;">Death Registration Application</h2>

  <label>Full Name of Deceased</label>
  <input type="text" id="name" placeholder="Deceased's full name" required>

  <label>Date of Death</label>
  <input type="date" id="dob" required>

  <label>Place of Death</label>
  <input type="text" id="place" placeholder="Hospital / Home / City">

  <label>Informant Name</label>
  <input type="text" id="informant" placeholder="Your full name">

  <label>Upload Death Proof (optional)</label>
  <input type="file" id="userFile" accept=".pdf,.jpg,.jpeg,.png">

  <button type="submit" id="submitBtn">Submit Application</button>
  <button type="button" class="back" onclick="location.href='index.html#servicesPanel'">Back to Home</button>
  <p id="msg"></p>
</form>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="form-submit.js"></script>
<script>
function handleSubmit(e) {
  e.preventDefault();
  submitToFirebase({
    service: "Death Registration",
    name: document.getElementById("name").value,
    dob: document.getElementById("dob").value,
    place: document.getElementById("place").value,
    informant: document.getElementById("informant").value
  });
}
</script>
</body>
</html>
