<!DOCTYPE html>
<html>
<head>
<title>Birth Registration</title>
<style>
body{margin:0;padding-top:90px;font-family:Arial,Helvetica,sans-serif;background-image:url("https://image2url.com/r2/default/images/1774809435108-e18be1d1-5f79-43fe-9e19-578556d5720c.jpg");background-size:cover;background-position:center;background-attachment:fixed;}
header{background:#0b3d91;color:white;display:flex;align-items:center;justify-content:space-between;padding:15px 40px;position:fixed;top:0;left:0;right:0;z-index:1000;}
.logo{display:flex;align-items:center;gap:10px;}
nav a{color:white;text-decoration:none;margin:0 12px;font-weight:bold;}
form{background:white;padding:30px;width:400px;margin:auto;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
label{font-weight:bold;display:block;margin-top:10px;}
input,select{width:100%;padding:10px;margin:6px 0;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;}
button{background:#0b3d91;color:white;border:none;padding:10px 20px;cursor:pointer;border-radius:5px;margin-top:10px;width:100%;}
button.back{background:#555;margin-top:8px;}
#msg{text-align:center;font-weight:bold;margin-top:10px;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" height="40">
    <h2>Smart E-Governance Portal</h2>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#servicesPanel">Explore Services</a>
    <a href="track.html">Track</a>
    <a href="admin-login.html">Admin</a>
  </nav>
</header>

<form onsubmit="submitApplication(event)">
  <h2 style="color:#0b3d91;text-align:center;">Birth Registration Application</h2>

  <label>Child Name</label>
  <input type="text" id="name" placeholder="Enter child's full name" required>

  <label>Date of Birth</label>
  <input type="date" id="dob" required>

  <label>Father's Name</label>
  <input type="text" id="father" placeholder="Father's full name">

  <label>Mother's Name</label>
  <input type="text" id="mother" placeholder="Mother's full name">

  <label>Upload Birth Proof (optional)</label>
  <input type="file" id="userFile" accept=".pdf,.jpg,.jpeg,.png">

  <button type="submit" id="submitBtn">Submit Application</button>
  <button type="button" class="back" onclick="location.href='index.html#servicesPanel'">Back to Home</button>

  <p id="msg"></p>
</form>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
async function submitApplication(event) {
  event.preventDefault();
  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("msg");
  btn.disabled = true;
  btn.textContent = "Submitting...";
  msg.style.color = "blue";
  msg.textContent = "Please wait...";

  const appID = "GOV" + Math.floor(Math.random() * 900000 + 100000);

  // Handle optional file as base64
  let fileData = "";
  const fileInput = document.getElementById("userFile");
  if (fileInput.files.length > 0) {
    fileData = await toBase64(fileInput.files[0]);
  }

  const application = {
    id: appID,
    service: "Birth Registration",
    name: document.getElementById("name").value,
    dob: document.getElementById("dob").value,
    father: document.getElementById("father").value,
    mother: document.getElementById("mother").value,
    status: "Pending",
    reason: "",
    certificate: "",
    userFile: fileData,
    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection("applications").doc(appID).set(application);
    msg.style.color = "green";
    msg.textContent = "✅ Submitted! Application ID: " + appID;
    alert("Application Submitted Successfully\nApplication ID: " + appID);
    window.location.href = "track.html";
  } catch (e) {
    msg.style.color = "red";
    msg.textContent = "❌ Error: " + e.message;
    btn.disabled = false;
    btn.textContent = "Submit Application";
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
</script>
</body>
</html>
