<!DOCTYPE html>
<html>
<head>

<title>Admin Login</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;

background:linear-gradient(135deg,#0b3d91,#3498db);

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* Portal title */

.portal-header{
position:absolute;
top:20px;
display:flex;
align-items:center;
gap:10px;
color:white;
font-size:26px;
font-weight:bold;
}

/* Login box */

.login-box{
background:white;
padding:40px;
width:340px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

h2{
color:#0b3d91;
margin-bottom:20px;
}

/* Inputs */

input{
width:92%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

/* Login button */

button{
width:100%;
padding:12px;
background:#0b3d91;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button:hover{
background:#08306b;
transform:scale(1.05);
}

/* Home button */

.home-btn{
margin-top:15px;
background:#27ae60;
}

.home-btn:hover{
background:#1e8449;
}

#error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="portal-header">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" height="40">

Smart E-Governance Portal

</div>

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<button class="home-btn" onclick="goHome()">Back to Home</button>

<p id="error"></p>

</div>

<script>

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user==="admin" && pass==="admin123"){

window.location.href="admin.html"

}else{

document.getElementById("error").innerHTML="Invalid Username or Password"

}

}

function goHome(){
window.location.href="index.html"
}

</script>

</body>
</html>
